name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v3
        with:
          version: 2.75.0

      # Solo los servicios que los tests de aislamiento/permisos necesitan
      # (kong = gateway único en :54321, auth = gotrue, api = postgrest).
      # Excluir el resto (storage, realtime, studio, imgproxy, edge-runtime,
      # analytics/vector, pooler, mailpit) evita ~9 imágenes/contenedores que
      # no se usan y que hacían `supabase start` completo demasiado lento
      # para CI (ver docs/DECISIONS.md).
      - name: Start local Supabase (minimal services)
        run: |
          supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Wait for Supabase REST/Auth to answer
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/health > /dev/null; then
              echo "Auth respondiendo, continuando."
              break
            fi
            echo "Esperando a que Auth responda... ($i/30)"
            sleep 2
          done
          # `supabase start` ya espera los healthchecks de los contenedores,
          # pero se vio en local un flake puntual de PostgREST ("JWT issued
          # at future") justo tras un arranque en frío — este margen evita
          # que contamine el CI (ver docs/DECISIONS.md).
          sleep 5

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          # Clave service_role de demo, pública y fija para cualquier `supabase start`
          # local (no es un secreto real) — search.test.ts (bloque 1.1) la usa para
          # bypassar RLS al insertar/borrar filas sintéticas del catálogo.
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      - run: pnpm build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - uses: supabase/setup-cli@v3
        with:
          version: 2.75.0

      # Mismo patrón que el job de unit tests, MÁS storage-api: a diferencia
      # del job de unit tests, e2e/vendors.spec.ts (bloque 1.2) sube un PDF de
      # verdad al bucket `contracts` a través del navegador — sin storage-api
      # corriendo, esa llamada se queda colgada y el submit nunca redirige
      # (visto en CI: "Test timeout of 30000ms exceeded" en waitForURL tras
      # el submit). imgproxy sigue excluido: no se usa (no hay
      # transformación de imágenes, solo PDFs servidos tal cual).
      - name: Start local Supabase (minimal services)
        run: |
          supabase start -x realtime,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Wait for Supabase REST/Auth to answer
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/health > /dev/null; then
              echo "Auth respondiendo, continuando."
              break
            fi
            echo "Esperando a que Auth responda... ($i/30)"
            sleep 2
          done
          sleep 5

      - run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
